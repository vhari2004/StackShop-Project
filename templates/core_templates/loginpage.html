{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StackShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>

<body class="font-sans flex flex-col min-h-screen text-[#30364F] relative bg-cover bg-center bg-no-repeat" 
      style="background-image: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&q=80&w=2070');">
    
    <div class="absolute inset-0 bg-[#30364F]/70 backdrop-blur-[4px] z-0"></div>

    <main class="relative z-10 flex-grow flex flex-col items-center justify-center p-4">
        
        <div class="w-full max-w-md flex items-center justify-between mb-6 px-2">
            <a href="{% url 'home' %}" class="w-10 h-10 flex items-center justify-center rounded-full bg-[#F0F0DB]/10 text-[#F0F0DB] border border-[#ACBAC4]/30 hover:bg-[#F0F0DB] hover:text-[#30364F] transition-all shadow-sm" title="Back to Shop">
                <span class="material-icons text-[20px]">arrow_back</span>
            </a>
            
            <div class="flex items-center gap-2 select-none">
                <img alt="Logo" class="w-10 h-10 drop-shadow-lg" src="{% static 'core/homehtml/stackshoplogo.jpeg' %}" />
                <span class="text-2xl font-black tracking-wide text-[#F0F0DB] drop-shadow-md">StackShop</span>
            </div>
            
            <div class="w-10"></div> 
        </div>

        <div class="bg-[#F0F0DB] p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-[#E1D9BC]">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-[#30364F]">Welcome Back</h2>
                <p class="text-sm text-[#30364F] mt-2 opacity-80 font-medium">Sign in to access your StackShop account</p>
            </div>

            {% include "core_templates/messages.html" %}

            <form action="#" method="POST">
                {% csrf_token %}
                <div class="mb-5">
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-[#30364F]" for="username">Username or Email</label>
                    <input
                        class="w-full px-4 py-3.5 border border-[#ACBAC4]/50 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#30364F] focus:border-transparent bg-white placeholder-[#ACBAC4] transition-all font-medium shadow-inner"
                        type="text" id="username" name="usernameoremail" placeholder="Enter username or email" required>
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-[#30364F]" for="password">Password</label>
                    <input
                        class="w-full px-4 py-3.5 border border-[#ACBAC4]/50 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#30364F] focus:border-transparent bg-white placeholder-[#ACBAC4] transition-all font-medium shadow-inner"
                        type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="flex items-center justify-between mb-8">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" name="remember"
                            class="w-4 h-4 rounded border-[#ACBAC4] text-[#30364F] focus:ring-[#30364F] cursor-pointer transition-colors">
                        <span class="ml-2 text-sm font-bold text-[#30364F]/80 group-hover:text-[#30364F] transition-colors">Remember me</span>
                    </label>
                    <a href="{% url 'forgot_password' %}" class="text-sm font-bold text-[#30364F] hover:underline hover:text-[#ACBAC4] transition-colors">Forgot Password?</a>
                </div>

                <button
                    class="w-full bg-[#30364F] hover:bg-[#30364F]/90 text-[#F0F0DB] font-black uppercase tracking-widest py-3.5 px-4 rounded-xl focus:outline-none focus:ring-4 focus:ring-[#ACBAC4] transition-all duration-200 shadow-md hover:-translate-y-0.5 active:translate-y-0"
                    type="submit">
                    Sign In
                </button>
            </form>
            
            <div class="flex items-center my-6">
                <hr class="flex-grow border-[#ACBAC4]/50">
                <span class="px-3 text-[10px] uppercase tracking-widest text-[#30364F] font-black">Or register with</span>
                <hr class="flex-grow border-[#ACBAC4]/50">
            </div>

            <div class="flex gap-3">
                <button
                    class="flex-1 flex items-center justify-center gap-2 bg-white border border-[#ACBAC4]/50 text-gray-700 text-sm font-bold py-2.5 px-3 rounded-xl hover:bg-gray-50 transition-all shadow-sm active:scale-95">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                    </svg>
                    Google
                </button>

                <button
                    class="flex-1 flex items-center justify-center gap-2 bg-[#1877F2] text-white text-sm font-bold py-2.5 px-3 rounded-xl hover:bg-opacity-90 transition-all shadow-sm active:scale-95">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                    </svg>
                    Facebook
                </button>
            </div>

            <p class="text-center text-sm mt-8 font-medium">
                Don't have an account?
                <a href="{% url 'register' %}"
                    class="font-black text-[#30364F] hover:underline hover:text-[#ACBAC4] transition-colors ml-1">Create one</a>
            </p>
        </div>
    </main>

    <footer class="relative z-10 py-6 text-center text-[#F0F0DB]/70 text-xs font-bold tracking-widest uppercase">
        <div class="container mx-auto">
            <p>&copy; 2026 StackShop. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
