<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StackShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F0F0DB] font-sans flex flex-col min-h-screen text-[#30364F]">
    <div class="sticky top-0 z-50 w-full bg-light/70 backdrop-blur-md pb-2">
        <header class="w-full pt-1 px-4 z-50 sticky top-0">
            <nav
                class="bg-[#30364F] text-[#F0F0DB] rounded-xl px-6 py-4 flex items-center justify-between shadow-lg w-full">
                <a href="{%url 'home'%}"
                    class="flex items-center gap-3 cursor-pointer hover:opacity-90 transition-opacity">
                    {% load static%}
                    <img alt="Logo" class="w-12 h-12 text-accent" fill="currentColor"
                        src="{% static 'core/homehtml/stackshoplogo.png' %}" />
                    <span class="text-xl font-bold tracking-wide">StackShop</span>
                </a>

                <a href="{%url 'home'%}"
                    class="text-sm font-bold text-[#ACBAC4] hover:text-[#F0F0DB] transition-colors flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Return to Shop
                </a>
            </nav>
        </header>
    </div>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-[#E1D9BC] p-8 rounded-xl shadow-lg w-full max-w-md border border-[#ACBAC4]">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-[#30364F]">Welcome Back</h2>
                <p class="text-sm text-[#30364F] mt-2 opacity-80">Sign in to access your StackShop account</p>
            </div>

            <form action="#" method="POST">
                {% csrf_token %}
                <div class="mb-5">
                    <label class="block text-sm font-bold mb-2" for="username">Username or Email</label>
                    <input
                        class="w-full px-4 py-3 border border-[#ACBAC4] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#30364F] focus:border-transparent bg-[#F0F0DB] placeholder-[#ACBAC4] transition-all"
                        type="text" id="username" name="usernameoremail" placeholder="Enter username or email" required>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2" for="password">Password</label>
                    <input
                        class="w-full px-4 py-3 border border-[#ACBAC4] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#30364F] focus:border-transparent bg-[#F0F0DB] placeholder-[#ACBAC4] transition-all"
                        type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="flex items-center justify-between mb-8">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" name="remember"
                            class="w-4 h-4 rounded border-[#ACBAC4] text-[#30364F] focus:ring-[#30364F] cursor-pointer">
                        <span class="ml-2 text-sm font-medium">Remember me</span>
                    </label>
                    <a href="#" class="text-sm font-bold hover:underline hover:text-[#ACBAC4] transition-colors">Forgot
                        Password?</a>
                </div>

                <button
                    class="w-full bg-[#30364F] hover:bg-opacity-90 text-[#F0F0DB] font-bold py-3 px-4 rounded-lg focus:outline-none focus:ring-4 focus:ring-[#ACBAC4] transition-all duration-200"
                    type="submit">
                    Sign In
                </button>
            </form>
            <div class="flex items-center my-5">
                <hr class="flex-grow border-[#ACBAC4]">
                <span class="px-3 text-xs text-[#30364F] opacity-70 font-medium">Or register with</span>
                <hr class="flex-grow border-[#ACBAC4]">
            </div>

            <div class="flex gap-3">
                <button
                    class="flex-1 flex items-center justify-center gap-2 bg-white border border-[#ACBAC4] text-gray-700 text-sm font-bold py-2 px-3 rounded-lg hover:bg-gray-50 transition-colors shadow-sm">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Google
                </button>

                <button
                    class="flex-1 flex items-center justify-center gap-2 bg-[#1877F2] text-white text-sm font-bold py-2 px-3 rounded-lg hover:bg-opacity-90 transition-colors shadow-sm">
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                    </svg>
                    Facebook
                </button>
            </div>

            <p class="text-center text-sm mt-8">
                Don't have an account?
                <a href="{%url 'register'%}"
                    class="font-bold hover:underline hover:text-[#ACBAC4] transition-colors">Create one</a>
            </p>
        </div>
    </main>

    <footer class="bg-[#30364F] text-[#ACBAC4] py-6 text-center text-sm mt-auto shadow-inner">
        <div class="container mx-auto">
            <p>&copy; 2026 StackShop. All rights reserved.</p>
        </div>
    </footer>

</body>

</html>
