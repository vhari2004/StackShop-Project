<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StackShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F0F0DB] font-sans flex flex-col min-h-screen text-[#30364F]">
    <header class="w-full pt-6 px-4 z-50">
        <nav class="bg-[#30364F] text-[#F0F0DB] rounded-xl px-6 py-4 flex items-center justify-between shadow-lg w-full">
            <a href="{%url 'home'%}" class="flex items-center gap-3 cursor-pointer hover:opacity-90 transition-opacity">
{% load static%}
                <img alt="Logo" class="w-12 h-12 text-accent" fill="currentColor"
                    src="{% static 'core/homehtml/stackshoplogo.png' %}" />
                <span class="text-xl font-bold tracking-wide">StackShop</span>
            </a>
            
            <a href="{%url 'home'%}" class="text-sm font-bold text-[#ACBAC4] hover:text-[#F0F0DB] transition-colors flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Return to Shop
            </a>
        </nav>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-[#E1D9BC] p-8 rounded-xl shadow-lg w-full max-w-md border border-[#ACBAC4]">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-[#30364F]">Welcome Back</h2>
                <p class="text-sm text-[#30364F] mt-2 opacity-80">Sign in to access your StackShop account</p>
            </div>

            <form action="#" method="POST">
                {% csrf_token %}
                <div class="mb-5">
                    <label class="block text-sm font-bold mb-2" for="username">Username or Email</label>
                    <input 
                        class="w-full px-4 py-3 border border-[#ACBAC4] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#30364F] focus:border-transparent bg-[#F0F0DB] placeholder-[#ACBAC4] transition-all" 
                        type="text" 
                        id="username" 
                        name="usernameoremail"
                        placeholder="Enter username or email"
                        required>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2" for="password">Password</label>
                    <input 
                        class="w-full px-4 py-3 border border-[#ACBAC4] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#30364F] focus:border-transparent bg-[#F0F0DB] placeholder-[#ACBAC4] transition-all" 
                        type="password" 
                        id="password" 
                        name="password"
                        placeholder="••••••••"
                        required>
                </div>

                <div class="flex items-center justify-between mb-8">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" name="remember" class="w-4 h-4 rounded border-[#ACBAC4] text-[#30364F] focus:ring-[#30364F] cursor-pointer">
                        <span class="ml-2 text-sm font-medium">Remember me</span>
                    </label>
                    <a href="#" class="text-sm font-bold hover:underline hover:text-[#ACBAC4] transition-colors">Forgot Password?</a>
                </div>

                <button 
                    class="w-full bg-[#30364F] hover:bg-opacity-90 text-[#F0F0DB] font-bold py-3 px-4 rounded-lg focus:outline-none focus:ring-4 focus:ring-[#ACBAC4] transition-all duration-200" 
                    type="submit">
                    Sign In
                </button>
            </form>

            <p class="text-center text-sm mt-8">
                Don't have an account? 
                <a href="{%url 'register'%}" class="font-bold hover:underline hover:text-[#ACBAC4] transition-colors">Create one</a>
            </p>
        </div>
    </main>

    <footer class="bg-[#30364F] text-[#ACBAC4] py-6 text-center text-sm mt-auto shadow-inner">
        <div class="container mx-auto">
            <p>&copy; 2026 StackShop. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
