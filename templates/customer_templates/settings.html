<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - StackShop</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link type="icon/" rel="icon" href="{% static 'core/homehtml/stackshoplogo.png' %}" />
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-[#F0F0DB] font-sans flex min-h-screen text-[#30364F]">

    <aside id="dashboardSidebar" class="hidden md:flex w-full md:w-64 bg-[#30364F] flex flex-col flex-shrink-0 shadow-xl z-10 md:min-h-screen">
        {% include "customer_templates/profile_sidebar.html" %}
    </aside>

    <main id="dashboardMain" class="flex-grow flex flex-col items-center justify-start p-4 md:p-8 overflow-y-auto">
        <div class="w-full max-w-6xl mb-4 md:hidden">
            <button id="sidebarToggleBtn" onclick="toggleSidebar()" class="flex items-center gap-2 px-3 py-2 bg-[#30364F] text-[#F0F0DB] rounded-lg shadow-md">
                <span class="material-icons">menu</span>
                <span class="font-bold text-sm">Menu</span>
            </button>
        </div>

        {% include "core_templates/messages.html" %}

        <div class="bg-white rounded-2xl shadow-sm border border-muted/30 w-full max-w-6xl p-10 lg:p-14">
            <div class="flex items-center justify-between mb-10 border-b border-muted/20 pb-4">
                <h2 class="text-2xl font-black text-dark tracking-wide">Account Settings</h2>
                <span class="text-sm font-medium text-muted">Manage account security and preferences</span>
            </div>

            <form method="POST" class="space-y-8">
                {% csrf_token %}

                <div class="border rounded-xl p-6 bg-gray-50">
                    <h3 class="text-xl font-bold mb-4">Change Password</h3>

                    <div class="grid gap-4">
                        <div>
                            <label class="text-sm font-bold mb-1 block">Current Password</label>
                            <input type="password" name="current_password" required
                                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-dark focus:ring-1 focus:ring-dark" />
                        </div>
                        <div>
                            <label class="text-sm font-bold mb-1 block">New Password</label>
                            <input type="password" name="new_password" required
                                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-dark focus:ring-1 focus:ring-dark" />
                        </div>
                        <div>
                            <label class="text-sm font-bold mb-1 block">Confirm New Password</label>
                            <input type="password" name="confirm_password" required
                                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-dark focus:ring-1 focus:ring-dark" />
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-4 pt-6 border-t border-muted/20">
                    <a href="{% url 'profile' %}"
                        class="px-6 py-2.5 text-sm font-bold text-muted hover:text-dark transition-colors">Back to Profile</a>
                    <button type="submit"
                        class="px-8 py-2.5 bg-dark text-light rounded-xl text-sm font-bold hover:bg-accent hover:text-dark shadow-md transition-all active:scale-95">Save
                        Password</button>
                </div>
            </form>

        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('dashboardSidebar')
            const main = document.getElementById('dashboardMain')
            if (!sidebar || !main) return
            sidebar.classList.toggle('hidden')
            if (sidebar.classList.contains('hidden')) {
                main.classList.remove('md:ml-64')
            } else {
                main.classList.add('md:ml-64')
            }
        }

        document.addEventListener('click', function (event) {
            const sidebar = document.getElementById('dashboardSidebar')
            const toggleBtn = document.getElementById('sidebarToggleBtn')
            if (!sidebar || !toggleBtn) return
            if (window.innerWidth >= 768) return
            if (!sidebar.classList.contains('hidden') && !sidebar.contains(event.target) && !toggleBtn.contains(event.target)) {
                sidebar.classList.add('hidden')
            }
        })
    </script>
</body>

</html>
